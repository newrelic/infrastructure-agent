---
# Linux
- name: canaries
  hosts: testing_hosts_linux
  become: true
  gather_facts: yes

  tasks:
    - name: 🐤 Canaries A2Q
      ansible.builtin.include_vars:
        file: "vars/{{ inventory_hostname | regex_search('config[1-9]|config10') }}.yml"

    - name: Log selected file
      ansible.builtin.debug:
        msg: "Selected file: vars/{{ inventory_hostname | regex_search('config[1-9]|config10') }}.yml"

    - block:
        - name: install latest agent on host
          ansible.builtin.include_role:
            name: caos.ansible_roles.infra_agent
          vars:
            repo_endpoint: "http://nr-downloads-ohai-staging.s3-website-us-east-1.amazonaws.com/infrastructure_agent"
        - name: Debug display_name before using it
          ansible.builtin.debug:
            var: display_name

        - name: install latest agent in container
          ansible.builtin.include_role:
            name: caos.ansible_roles.infra_agent
          vars:
            is_containerized: true
            target_version: "{{ current_version }}-rc"
            display_name: "{{ inventory_hostname }}-current-a2q"

        - name: install previous agent in container
          ansible.builtin.include_role:
            name: caos.ansible_roles.infra_agent
          vars:
            is_containerized: true
            target_version: "{{ previous_version }}"
            display_name: "{{ inventory_hostname }}-current-a2q"
...
