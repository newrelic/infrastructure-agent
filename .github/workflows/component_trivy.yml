name: .. 🚧 🕵🏼 Trivy

on:
  workflow_call:
    secrets:
      slack_webhook:
        required: false
    inputs:
      tag:
        required: true
        type: string
      severity:
        required: false
        type: string
        default: 'CRITICAL,HIGH'
      FIPS:
        required: false
        type: boolean
        default: false

env:
  FIPS: ${{ inputs.FIPS == true && '-fips' || '' }}

jobs:
  trivy_scanner:
    name: Trivy scanner for docker
    runs-on: ubuntu-latest
    if: ${{ ! github.event.schedule }} # Table output
    steps:
      - name: newrelic/infrastructure
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: "docker.io/newrelic/infrastructure${{ env.FIPS }}:${{ inputs.tag }}"
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: "${{ inputs.severity }}"
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db
          TRIVY_JAVA_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-java-db

      - name: newrelic/k8s-events-forwarder
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: "docker.io/newrelic/k8s-events-forwarder${{ env.FIPS }}:${{ inputs.tag }}"
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: "${{ inputs.severity }}"
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db
          TRIVY_JAVA_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-java-db

      - name: newrelic/nri-forwarder
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: "docker.io/newrelic/nri-forwarder${{ env.FIPS }}:${{ inputs.tag }}"
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: "${{ inputs.severity }}"
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db
          TRIVY_JAVA_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-java-db

  trivy_scanner_scheduled:
    name: Scheduled Trivy scanner for docker
    runs-on: ubuntu-latest
    if: ${{ github.event.schedule }} # Upload sarif when running periodically
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Sarif newrelic/infrastructure
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: "docker.io/newrelic/infrastructure${{ env.FIPS }}:${{ inputs.tag }}"
          format: 'sarif'
          output: 'trivy-results.sarif'
          vuln-type: 'os,library'
          severity: "${{ inputs.severity }}"
          exit-code: '1'
          ignore-unfixed: true
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db
          TRIVY_JAVA_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-java-db

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: ${{ always() }}
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Send Slack notification
        if: ${{ failure() }}
        uses: archive/github-actions-slack@master
        with:
          slack-bot-user-oauth-access-token: ${{ secrets.COREINT_SLACK_TOKEN }}
          slack-channel: ${{ secrets.COREINT_SLACK_CHANNEL }}
          slack-text: ":rotating_light: Hi CAOS (@hero), critical or high vulnerabilities found, see: https://github.com/newrelic/infrastructure-agent/security/code-scanning?query=is%3Aopen+branch%3Amaster+tool%3ATrivy :rotating_light:"
