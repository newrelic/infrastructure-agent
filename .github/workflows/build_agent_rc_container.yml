name: . 🚀 🐳 Build Infra Agent Image - RC

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag'
        required: true

permissions:
  contents: read

jobs:
  packaging-docker:
    uses: ./.github/workflows/component_docker_packaging.yml
    secrets:
      DOCKER_HUB_ID: ${{secrets.OHAI_DOCKER_HUB_ID}}
      DOCKER_HUB_PASSWORD: ${{secrets.OHAI_DOCKER_HUB_PASSWORD}}
      GPG_MAIL: 'infrastructure-eng@newrelic.com'
      GPG_PASSPHRASE: ${{ secrets.OHAI_GPG_PASSPHRASE }}
      GPG_PRIVATE_KEY_BASE64: ${{ secrets.OHAI_GPG_PRIVATE_KEY_BASE64 }} # base64 encoded
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    with:
      TAG: ${{ github.event.inputs.tag }}

  packaging-docker-windows:
    uses: ./.github/workflows/component_docker_build_windows.yml
    secrets:
      DOCKER_HUB_ID: ${{secrets.OHAI_DOCKER_HUB_ID}}
      DOCKER_HUB_PASSWORD: ${{secrets.OHAI_DOCKER_HUB_PASSWORD}}
      PFX_CERTIFICATE_BASE64: ${{ secrets.OHAI_PFX_CERTIFICATE_BASE64 }}
      PFX_PASSPHRASE: ${{ secrets.OHAI_PFX_PASSPHRASE }}
    with:
      TAG: ${{ github.event.inputs.tag }}
      PUBLISH: true