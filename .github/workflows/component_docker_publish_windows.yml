name: .. 🚧 Docker | Publish Windows image

on:
  workflow_dispatch:
    inputs:
      TAG:
        description: 'Tag version (e.g., 1.72.5)'
        required: true
        type: string
  workflow_call:
    inputs:
      TAG:
        required: true
        type: string

permissions: {}

env:
  TAG: ${{ inputs.TAG }}

jobs:
  publish-windows-ltsc2022:
    name: Promote Windows ltsc2022 image
    runs-on: windows-x64-8-core

    steps:
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.OHAI_DOCKER_HUB_ID }}
          password: ${{ secrets.OHAI_DOCKER_HUB_PASSWORD }}

      - name: Pull RC image
        run: docker pull newrelic/infrastructure:${{ env.TAG }}-rc-ltsc2022

      - name: Retag to release version
        run: docker tag newrelic/infrastructure:${{ env.TAG }}-rc-ltsc2022 newrelic/infrastructure:${{ env.TAG }}-ltsc2022

      - name: Push release image
        run: docker push newrelic/infrastructure:${{ env.TAG }}-ltsc2022

  publish-windows-ltsc2019:
    name: Promote Windows ltsc2019 image
    runs-on: windows-x64-8-core

    steps:
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.OHAI_DOCKER_HUB_ID }}
          password: ${{ secrets.OHAI_DOCKER_HUB_PASSWORD }}

      - name: Pull RC image
        run: docker pull newrelic/infrastructure:${{ env.TAG }}-rc-ltsc2019

      - name: Retag to release version
        run: docker tag newrelic/infrastructure:${{ env.TAG }}-rc-ltsc2019 newrelic/infrastructure:${{ env.TAG }}-ltsc2019

      - name: Push release image
        run: docker push newrelic/infrastructure:${{ env.TAG }}-ltsc2019
