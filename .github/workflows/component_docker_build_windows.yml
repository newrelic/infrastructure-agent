name: .. 🚧 Docker | Compile Windows image

on:
  workflow_call:
    secrets:
      DOCKER_HUB_ID:
        required: false
      DOCKER_HUB_PASSWORD:
        required: false
      PFX_CERTIFICATE_BASE64:
        required: true
      PFX_PASSPHRASE:
        required: true
    inputs:
      TAG:
        required: true
        type: string
      PUBLISH:
        default: true
        required: true
        type: boolean

env:
  TAG: ${{ inputs.TAG }}
  DOCKER_PUBLISH: ${{ inputs.PUBLISH == true }}
  PFX_CERTIFICATE_BASE64: ${{ secrets.PFX_CERTIFICATE_BASE64 }}
  PFX_PASSPHRASE: ${{ secrets.PFX_PASSPHRASE }}
  PFX_CERTIFICATE_DESCRIPTION: 'New Relic'

jobs:
  build-windows-ltsc2022:
    name: Build Windows container (ltsc2022)
    runs-on: windows-2022
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          check-latest: true

      - name: Login to DockerHub
        if: ${{ inputs.PUBLISH == true }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_ID }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Get PFX certificate from GH secrets
        shell: bash
        run: printf "%s" "$PFX_CERTIFICATE_BASE64" | base64 -d - > wincert.pfx

      - name: Import PFX certificate
        shell: pwsh
        run: |
          build\windows\scripts\set_cert_thumbprint_env.ps1 -PfxPassphrase "$env:PFX_PASSPHRASE" -PfxCertificateDescription "$env:PFX_CERTIFICATE_DESCRIPTION"

      - name: Set build date
        shell: bash
        run: echo "BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_ENV

      - name: Build Windows binaries
        shell: pwsh
        timeout-minutes: 30
        run: |
          .\build\windows\build.ps1 -arch amd64 -version ${{ inputs.TAG }} -commit "$env:GITHUB_SHA" -date "$env:BUILD_DATE" -certThumbprint "$env:certThumbprint"

      - name: Prepare binaries for Docker build
        shell: pwsh
        run: |
          # Create the dist directories expected by the Docker build
          New-Item -ItemType Directory -Force -Path "dist\windows-agent-amd64_windows_amd64_v1"
          New-Item -ItemType Directory -Force -Path "dist\windows-ctl-amd64_windows_amd64_v1"
          New-Item -ItemType Directory -Force -Path "dist\windows-service-amd64_windows_amd64_v1"

          # Copy the binaries to the expected locations
          Copy-Item "target\bin\windows_amd64\newrelic-infra.exe" "dist\windows-agent-amd64_windows_amd64_v1\"
          Copy-Item "target\bin\windows_amd64\newrelic-infra-ctl.exe" "dist\windows-ctl-amd64_windows_amd64_v1\"
          Copy-Item "target\bin\windows_amd64\newrelic-infra-service.exe" "dist\windows-service-amd64_windows_amd64_v1\"

      - name: Prepare workspace and assets
        shell: bash
        run: |
          # Clean and recreate workspace to ensure fresh assets
          rm -rf build/container/workspace
          make -C build/container/ workspace/assets IMAGE_VERSION=${{ inputs.TAG }}-test

      - name: Build Windows container (ltsc2022)
        shell: bash
        timeout-minutes: 15
        run: |
          AGENT_VERSION=${{ inputs.TAG }} \
          IMAGE_VERSION=${{ inputs.TAG }}-test \
          DOCKER_BUILD_TAG_PREFIX=${{ inputs.TAG }}-test \
          make -C build/container/ build/base-windows-ltsc2022

      - name: Test Windows container (ltsc2022)
        shell: pwsh
        timeout-minutes: 5
        run: |
          # Test that the image runs and shows version
          docker run --rm newrelic/infrastructure:${{ inputs.TAG }}-test-windows-ltsc2022 --version

      # - name: Push Windows container (ltsc2022)
      #   if: ${{ inputs.PUBLISH == true }}
      #   shell: bash
      #   run: |
      #     docker push newrelic/infrastructure:${{ inputs.TAG }}-test-windows-ltsc2022

  build-windows-ltsc2019:
    name: Build Windows container (ltsc2019)
    runs-on: windows-x64-8-core
    timeout-minutes: 60

    steps:
      - name: Verify Hyper-V Support
        shell: pwsh
        run: |
          Write-Host "Checking Hyper-V availability..."

          # Try Windows 10/11 method first
          $hyperv = Get-WindowsOptionalFeature -Online -FeatureName Microsoft-Hyper-V-All -ErrorAction SilentlyContinue
          $isWindowsServer = $false

          if ($null -eq $hyperv) {
            Write-Host "Checking via Get-WindowsFeature (Windows Server)..."
            $hyperv = Get-WindowsFeature -Name Hyper-V -ErrorAction SilentlyContinue
            $isWindowsServer = $true
          }

          if ($null -eq $hyperv) {
            Write-Error "❌ Hyper-V feature not found on this system."
            Write-Host "Current host OS version:"
            [System.Environment]::OSVersion.Version
            exit 1
          }

          # Check if enabled - different properties for Server vs Desktop
          $isEnabled = $false
          if ($isWindowsServer) {
            # Windows Server uses InstallState property
            Write-Host "Windows Server detected"
            Write-Host "Hyper-V InstallState: $($hyperv.InstallState)"
            Write-Host "Hyper-V Installed: $($hyperv.Installed)"
            $isEnabled = ($hyperv.Installed -eq $true) -or ($hyperv.InstallState -eq "Installed")
          } else {
            # Windows 10/11 uses State property
            Write-Host "Windows Desktop detected"
            Write-Host "Hyper-V State: $($hyperv.State)"
            $isEnabled = ($hyperv.State -eq "Enabled")
          }

          if (-not $isEnabled) {
            Write-Error "❌ Hyper-V is not enabled. This runner needs Hyper-V to build Windows 2019 images on Windows Server 2022."
            Write-Host "Current host OS version:"
            [System.Environment]::OSVersion.Version
            exit 1
          }

          Write-Host "✅ Hyper-V is enabled"
          Write-Host "Host OS version:"
          [System.Environment]::OSVersion.Version

          # Verify Docker can use Hyper-V isolation with ltsc2019
          Write-Host "`nTesting Docker Hyper-V isolation with Windows Server 2019 base image..."
          docker run --rm --isolation=hyperv mcr.microsoft.com/windows/nanoserver:ltsc2019 cmd /c echo "Hyper-V isolation works"

          Write-Host "✅ Docker Hyper-V isolation is functional for ltsc2019 images"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          check-latest: true

      - name: Login to DockerHub
        if: ${{ inputs.PUBLISH == true }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_ID }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Get PFX certificate from GH secrets
        shell: bash
        run: printf "%s" "$PFX_CERTIFICATE_BASE64" | base64 -d - > wincert.pfx

      - name: Import PFX certificate
        shell: pwsh
        run: |
          build\windows\scripts\set_cert_thumbprint_env.ps1 -PfxPassphrase "$env:PFX_PASSPHRASE" -PfxCertificateDescription "$env:PFX_CERTIFICATE_DESCRIPTION"

      - name: Set build date
        shell: bash
        run: echo "BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_ENV

      - name: Build Windows binaries
        shell: pwsh
        timeout-minutes: 30
        run: |
          .\build\windows\build.ps1 -arch amd64 -version ${{ inputs.TAG }} -commit "$env:GITHUB_SHA" -date "$env:BUILD_DATE" -certThumbprint "$env:certThumbprint"

      - name: Prepare binaries for Docker build
        shell: pwsh
        run: |
          # Create the dist directories expected by the Docker build
          New-Item -ItemType Directory -Force -Path "dist\windows-agent-amd64_windows_amd64_v1"
          New-Item -ItemType Directory -Force -Path "dist\windows-ctl-amd64_windows_amd64_v1"
          New-Item -ItemType Directory -Force -Path "dist\windows-service-amd64_windows_amd64_v1"

          # Copy the binaries to the expected locations
          Copy-Item "target\bin\windows_amd64\newrelic-infra.exe" "dist\windows-agent-amd64_windows_amd64_v1\"
          Copy-Item "target\bin\windows_amd64\newrelic-infra-ctl.exe" "dist\windows-ctl-amd64_windows_amd64_v1\"
          Copy-Item "target\bin\windows_amd64\newrelic-infra-service.exe" "dist\windows-service-amd64_windows_amd64_v1\"

      - name: Prepare workspace and assets
        shell: bash
        run: |
          # Clean and recreate workspace to ensure fresh assets
          rm -rf build/container/workspace
          make -C build/container/ workspace/assets IMAGE_VERSION=${{ inputs.TAG }}-test

      - name: Build Windows container (ltsc2019)
        shell: bash
        timeout-minutes: 15
        run: |
          AGENT_VERSION=${{ inputs.TAG }} \
          IMAGE_VERSION=${{ inputs.TAG }}-test \
          DOCKER_BUILD_TAG_PREFIX=${{ inputs.TAG }}-test \
          make -C build/container/ build/base-windows-ltsc2019

      - name: Test Windows container (ltsc2019)
        shell: pwsh
        timeout-minutes: 5
        run: |
          # Test that the image runs and shows version
          docker run --rm newrelic/infrastructure:${{ inputs.TAG }}-test-windows-ltsc2019 --version

      # - name: Push Windows container (ltsc2019)
      #   if: ${{ inputs.PUBLISH == true }}
      #   shell: bash
      #   run: |
      #     docker push newrelic/infrastructure:${{ inputs.TAG }}-test-windows-ltsc2019
